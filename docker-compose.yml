services:
  tests:
    image: surfingkeys-tests:latest
    build: .
    user: "${UID}:${GID}"
    environment:
      - GIT_HASH
      - WORKERS
      - CONFIG_SERVER_PORT=9602
      - BUILD_SUFFIX=-test
      - DOCKER_CI=1
      # Uncomment to get machine-readable results:
      # - PLAYWRIGHT_JSON_OUTPUT=/app/test-artifacts/playwright/results.json
    volumes:
      - .:/app                                        # live source mount
      - /app/node_modules                             # shield container node_modules from host override
      - ${SURFINGKEYS_CONFIG_FILE:-/home/hassen/.surfingkeys-2026.js}:/home/hassen/.surfingkeys-2026.js:ro  # symlink target for .surfingkeysrc.js
      - ./test-artifacts/playwright:/app/test-artifacts/playwright   # HTML report
      - ./test-artifacts/coverage-raw:/app/test-artifacts/coverage-raw             # Coverage output
      - ./test-artifacts/coverage-manifests:/app/test-artifacts/coverage-manifests  # Coverage manifests
    # To run a subset or pass extra flags:
    # command: ["npm", "run", "test:playwright:parallel", "--", "--grep-invert", "cmd_capture_scrolling_element"]
