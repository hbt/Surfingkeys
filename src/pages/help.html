<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>SurfingKeys — Command Reference</title>
  <link rel="stylesheet" href="../content.css">
  <link rel="stylesheet" href="pages-nav.css">
  <link rel="stylesheet" href="help.css">
</head>
<body>
  <h1>Command Reference</h1>
  <div id="sk_help_toolbar">
    <span id="sk_help_count"></span>
    <label><input type="checkbox" id="toggle-unmapped"> hide unmapped</label>
  </div>
  <table id="sk_help_table">
    <thead>
      <tr><th>mapping</th><th>unique_id</th><th>description</th></tr>
      <tr id="sk_help_filter_row">
        <th><input id="filter-mapping"  type="text" placeholder="mapping…"     autocomplete="off"></th>
        <th><input id="filter-uid"      type="text" placeholder="unique_id…"   autocomplete="off"></th>
        <th><input id="filter-desc"     type="text" placeholder="description…" autocomplete="off"></th>
      </tr>
    </thead>
    <tbody id="sk_help_tbody"></tbody>
  </table>
  <h2 id="sk_omnibar_heading">Omnibar Commands</h2>
  <div id="sk_omnibar_toolbar">
    <input id="filter-omnibar" type="text" placeholder="filter commands…" autocomplete="off">
    <span id="sk_omnibar_count"></span>
  </div>
  <table id="sk_omnibar_cmd_table">
    <thead>
      <tr><th>name</th><th>description</th></tr>
    </thead>
    <tbody id="sk_omnibar_tbody"></tbody>
  </table>
  <script src="help.js"></script>
  <script src="../content.js"></script>
</body>
</html>
